version: v2
# Output paths mirror the proto import path under handler/grpc:
#   contract/user/user.proto        -> handler/grpc/user/user.pb.go
#   contract/grst/annotations.proto -> handler/grpc/grst/annotations.pb.go
plugins:
  - local: protoc-gen-go
    out: handler/grpc
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: handler/grpc
    opt: paths=source_relative
  # Generates Fiber route registration from grst.route options. Built into
  # ./bin by `make proto` before this template runs.
  - local: ./bin/protoc-gen-fiber
    out: handler/grpc
    opt: paths=source_relative
